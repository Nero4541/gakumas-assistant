name: Nightly Build

on:
  push:
    branches:
      - master
      - dev
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-ui/package.json

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.dev.txt

      - name: Export Model
        run: |
          python ./devtools/model_export.py

      - name: Get Cache Build
        id: cache-build
        uses: actions/cache@v3
        with:
          path: out/app.build
          key: ${{ runner.os }}-nuitka-build-${{ hashFiles('**/build_app.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-build-

      - name: Build app
        run: |
          python build_app.py
        env:
          GITHUB_ACTIONS: "True"

      - name: Compress Output
        shell: pwsh
        run: |
          $OutDir = "${{ github.workspace }}\out\app.dist\*"

          $Date = Get-Date -Format "yyyyMMdd"
          $Commit = "${{ github.sha }}".Substring(0, 8)
          
          $ZipName = "gakumas-assistant_nightly_Windows_amd64_${Date}_${Commit}.zip"
          $ZipPath = "${{ github.workspace }}\$ZipName"
          
          & "C:\Program Files\7-Zip\7z.exe" a `
            -tzip `
            -mx=9 `
            "$ZipPath" `
            "$OutDir\*"
          
          echo "ZIP_NAME=$ZipName" >> $env:GITHUB_ENV
          echo "ZIP_PATH=$ZipPath" >> $env:GITHUB_ENV

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 1
          overwrite: true