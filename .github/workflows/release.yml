name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发，如 v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "version"
        required: false
      prerelease:
        description: "prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write  # 允许创建 release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: true
        env:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UPX
        run: |
          choco install upx -y

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web-ui/package.json

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install -r requirements.dev.txt

      - name: Export Model
        run: |
          python ./devtools/model_export.py

      - name: Get Cache Build
        id: cache-build
        uses: actions/cache@v3
        with:
          path: out/app.build
          key: ${{ runner.os }}-nuitka-build-${{ hashFiles('**/build_app.py') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-build-

      - name: Build app
        run: |
          python build_app.py
        env:
          GITHUB_ACTIONS: "True"

      - name: Compress Output
        shell: pwsh
        run: |
          $OutDir = "${{ github.workspace }}\out\app.dist\*"
      
          $Version = if ("${{ github.event.inputs.version }}" -ne "") {
            "${{ github.event.inputs.version }}"
          } else {
            "${{ github.ref_name }}"
          }
      
          $Date = Get-Date -Format "yyyyMMdd"
          $Commit = "${{ github.sha }}".Substring(0, 8)
      
          $ZipName = "gakumas-assistant_${Version}_Windows_amd64_${Date}_${Commit}.zip"
          $ZipPath = "${{ github.workspace }}\$ZipName"
      
          & "C:\Program Files\7-Zip\7z.exe" a `
            -tzip `
            -mx=9 `
            "$ZipPath" `
            "$OutDir\*"
      
          echo "ZIP_NAME=$ZipName" >> $env:GITHUB_ENV

      - name: Generate Checksum
        run: sha256sum ${{ env.ZIP_NAME }} > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
            checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

