name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送版本标签时触发，如 v1.0.0
  workflow_dispatch:
    inputs:
      version:
        description: "version"
        required: false
      prerelease:
        description: "prerelease"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write  # 允许创建 release

jobs:
  prepare-android-touch-resources:
    # NDK r14b's bundled clang needs libncurses.so.5, which is not available on ubuntu-24.04.
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: maatouch
            repo_url: https://github.com/MaaAssistantArknights/MaaTouch.git
            repo_ref: master
            remote_ref: refs/heads/master
            output_dir: out/maatouch-package
            artifact_name: android-touch-resource-maatouch
          - name: minitouch
            repo_url: https://github.com/openstf/minitouch.git
            repo_ref: master
            remote_ref: refs/heads/master
            output_dir: out/minitouch-package
            artifact_name: android-touch-resource-minitouch
            android_ndk_version: r14b
            android_ndk_download_url: https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve upstream commit
        id: upstream
        shell: bash
        run: |
          set -euo pipefail
          commit="$(git ls-remote "${{ matrix.repo_url }}" "${{ matrix.remote_ref }}" | awk 'NR==1 { print $1 }')"
          if [[ -z "${commit}" ]]; then
            echo "Failed to resolve upstream commit for ${{ matrix.name }}" >&2
            exit 1
          fi
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"

      - name: Restore cached artifact
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.output_dir }}
          key: ${{ runner.os }}-${{ matrix.name }}-${{ steps.upstream.outputs.commit }}-${{ hashFiles('scripts/build_maatouch.sh', 'scripts/build_minitouch.sh', 'bin/THIRD_PARTY_NOTICES.md', 'bin/maatouch/README.md', 'bin/minitouch/README.md') }}

      - name: Setup Java
        if: matrix.name == 'maatouch' && steps.cache.outputs.cache-hit != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Download Android NDK
        if: matrix.name == 'minitouch' && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          ndk_root="${RUNNER_TEMP}/android-ndk"
          mkdir -p "${ndk_root}"
          curl -L "${{ matrix.android_ndk_download_url }}" -o "${ndk_root}/android-ndk.zip"
          unzip -q "${ndk_root}/android-ndk.zip" -d "${ndk_root}"
          echo "ANDROID_NDK_HOME=${ndk_root}/android-ndk-${{ matrix.android_ndk_version }}" >> "${GITHUB_ENV}"
          echo "NDK_BUILD=${ndk_root}/android-ndk-${{ matrix.android_ndk_version }}/ndk-build" >> "${GITHUB_ENV}"
          echo "${ndk_root}/android-ndk-${{ matrix.android_ndk_version }}" >> "${GITHUB_PATH}"

      - name: Install legacy NDK runtime dependencies
        if: matrix.name == 'minitouch' && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y libncurses5 libtinfo5

      - name: Build MaaTouch artifact
        if: matrix.name == 'maatouch' && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          MAATOUCH_REPO_URL: ${{ matrix.repo_url }}
          MAATOUCH_REF: ${{ matrix.repo_ref }}
          MAATOUCH_OUTPUT_DIR: ${{ github.workspace }}/${{ matrix.output_dir }}
        run: |
          set -euo pipefail
          bash ./scripts/build_maatouch.sh

      - name: Build minitouch artifact
        if: matrix.name == 'minitouch' && steps.cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          MINITOUCH_REPO_URL: ${{ matrix.repo_url }}
          MINITOUCH_REF: ${{ matrix.repo_ref }}
          MINITOUCH_OUTPUT_DIR: ${{ github.workspace }}/${{ matrix.output_dir }}
        run: |
          set -euo pipefail
          bash ./scripts/build_minitouch.sh

      - name: Show packaged files
        shell: bash
        run: |
          set -euo pipefail
          find "${{ matrix.output_dir }}" -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_dir }}
          if-no-files-found: error
          retention-days: 1

  prepare-clip-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Restore OpenAI CLIP cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/clip
          key: clip-vit-b-32-${{ hashFiles('.github/workflows/release.yml', 'requirements.dev.txt') }}
          restore-keys: |
            clip-vit-b-32-

      - name: Install clip export dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch torchvision
          pip install onnx onnxscript git+https://github.com/openai/CLIP.git

      - name: Export clip_visual.onnx
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import clip
          import torch
          output_path = Path("model/clip_visual.onnx").resolve()
          output_path.parent.mkdir(parents=True, exist_ok=True)
          download_root = Path.home() / ".cache" / "clip"
          download_root.mkdir(parents=True, exist_ok=True)
          model, _ = clip.load("ViT-B/32", device="cpu", download_root=str(download_root))
          visual_model = model.visual.eval().float()
          dummy_input = torch.randn(1, 3, 224, 224)
          torch.onnx.export(
              visual_model,
              dummy_input,
              output_path,
              input_names=["input"],
              output_names=["image_features"],
              dynamic_axes={"input": {0: "batch_size"}, "image_features": {0: "batch_size"}},
              do_constant_folding=True,
              dynamo=False,
          )
          print(f"exported: {output_path}")
          print(f"size_bytes: {output_path.stat().st_size}")
          PY

      - name: Upload clip model artifact
        uses: actions/upload-artifact@v4
        with:
          name: clip-visual-model
          path: model/clip_visual.onnx
          if-no-files-found: error
          retention-days: 1

  build:
    needs:
      - prepare-android-touch-resources
      - prepare-clip-model
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform_slug: windows
          - runner: ubuntu-latest
            platform_slug: linux
          - runner: macos-latest
            platform_slug: macos
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0
          lfs: false
        env:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Android touch artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: android-touch-resource-*
          merge-multiple: true
          path: ${{ github.workspace }}

      - name: Download clip model artifact
        uses: actions/download-artifact@v4
        with:
          name: clip-visual-model
          path: ${{ github.workspace }}/model

      - name: Verify bundled model payloads
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          required = [
              Path("model/base_ui.onnx"),
              Path("model/producer.onnx"),
              Path("model/clip_visual.onnx"),
          ]
          pointer_prefix = b"version https://git-lfs.github.com/spec/v1"
          invalid = []
          for path in required:
              payload = path.read_bytes()
              if payload.startswith(pointer_prefix):
                  invalid.append(f"{path} is still an LFS pointer")
              elif len(payload) < 1024 * 1024:
                  invalid.append(f"{path} is unexpectedly small: {len(payload)} bytes")
          if invalid:
              raise SystemExit("\n".join(invalid))
          PY

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y patchelf ccache

      - name: Install UPX
        if: runner.os == 'Windows'
        run: |
          choco install upx -y

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install requirements
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.build.txt

      - name: Restore build caches
        id: cache-build
        uses: actions/cache@v3
        with:
          path: |
            out/Gakumas Assistant.build
            .cache/nuitka
            .cache/ccache
          key: ${{ runner.os }}-nuitka-build-${{ hashFiles('build_app.py', 'requirements.txt', 'requirements.build.txt') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-build-

      - name: Build app
        shell: bash
        run: |
          set -euo pipefail
          python build_app.py --portable
        env:
          GITHUB_ACTIONS: "True"
          NUITKA_CACHE_DIR: ${{ github.workspace }}/.cache/nuitka
          CCACHE_DIR: ${{ github.workspace }}/.cache/ccache

      - name: Compress Output
        shell: bash
        env:
          VERSION: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}
          PLATFORM_SLUG: ${{ matrix.platform_slug }}
        run: |
          set -euo pipefail
          PACKAGE_ROOT="${GITHUB_WORKSPACE}/out"
          PACKAGE_BASE="Gakumas Assistant.dist"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            PACKAGE_BASE="Gakumas Assistant"
          fi
          DATE="$(date +%Y%m%d)"
          COMMIT="${GITHUB_SHA::8}"
          ARCH="$(python -c 'import os; mapping = {"X64": "amd64", "AMD64": "amd64", "ARM64": "arm64", "X86": "x86"}; arch = os.environ.get("RUNNER_ARCH", "").upper(); print(mapping.get(arch, arch.lower() or "unknown"))')"
          ZIP_NAME="gakumas-assistant_${VERSION}_${PLATFORM_SLUG}_${ARCH}_${DATE}_${COMMIT}.zip"
          ZIP_PATH="${GITHUB_WORKSPACE}/${ZIP_NAME}"
          export PACKAGE_ROOT PACKAGE_BASE ZIP_PATH
          python -c 'import os, shutil; root_dir = os.environ["PACKAGE_ROOT"]; base_dir = os.environ["PACKAGE_BASE"]; zip_path = os.environ["ZIP_PATH"]; base_name = zip_path[:-4] if zip_path.endswith(".zip") else zip_path; shutil.make_archive(base_name, "zip", root_dir=root_dir, base_dir=base_dir)'
          echo "ZIP_NAME=${ZIP_NAME}" >> "${GITHUB_ENV}"
          echo "ZIP_PATH=${ZIP_PATH}" >> "${GITHUB_ENV}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gakumas-assistant_*
          merge-multiple: true
          path: release-assets

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}
          name: ${{ github.event.inputs.version != '' && github.event.inputs.version || github.ref_name }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*.zip
            release-assets/checksums.txt
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
