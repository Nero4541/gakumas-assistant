name: Build Minitouch

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "openstf/minitouch branch or tag"
        required: false
        default: "master"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MINITOUCH_REPO_URL: https://github.com/openstf/minitouch.git
      MINITOUCH_REF: ${{ github.event.inputs.source_ref || 'master' }}
      MINITOUCH_OUTPUT_DIR: ${{ github.workspace }}/out/minitouch-package
      ANDROID_NDK_VERSION: r14b
      ANDROID_NDK_DOWNLOAD_URL: https://dl.google.com/android/repository/android-ndk-r14b-linux-x86_64.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Android NDK
        shell: bash
        run: |
          set -euo pipefail
          ndk_root="${RUNNER_TEMP}/android-ndk"
          mkdir -p "${ndk_root}"
          curl -L "${ANDROID_NDK_DOWNLOAD_URL}" -o "${ndk_root}/android-ndk.zip"
          unzip -q "${ndk_root}/android-ndk.zip" -d "${ndk_root}"
          echo "ANDROID_NDK_HOME=${ndk_root}/android-ndk-${ANDROID_NDK_VERSION}" >> "${GITHUB_ENV}"
          echo "NDK_BUILD=${ndk_root}/android-ndk-${ANDROID_NDK_VERSION}/ndk-build" >> "${GITHUB_ENV}"
          echo "${ndk_root}/android-ndk-${ANDROID_NDK_VERSION}" >> "${GITHUB_PATH}"

      - name: Build minitouch binaries
        shell: bash
        run: |
          set -euo pipefail
          bash ./scripts/build_minitouch.sh

      - name: Show packaged files
        shell: bash
        run: |
          set -euo pipefail
          find "${MINITOUCH_OUTPUT_DIR}" -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: minitouch-openstf-binaries
          path: out/minitouch-package
          if-no-files-found: error
          retention-days: 7
